<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings | Melissa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-d0g7+I1B5m/0q2ey3V55PsCTR6vM98xtA6+tZ7xYqJt+JUzltqRgItmKXbNUu32dGLvYkBg85V6u0UoYqLJqmg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="settings-page">
  <div class="page-shell">
    <header class="top-bar">
      <div class="brand">
        <a class="brand-badge" href="index.html">M</a>
        <div>
          <p class="brand-label">Melissa</p>
          <span class="brand-tag">Settings</span>
        </div>
      </div>
      <div class="top-actions">
        <a class="btn secondary" href="index.html"><i class="fas fa-home"></i> Home</a>
        <a class="btn secondary" href="shorts.html"><i class="fas fa-film"></i> Shorts</a>
      </div>
    </header>

    <main class="main-content settings-main">
      <section class="panel-card settings-panel">
        <h2>Preferences</h2>
        <div class="setting-row">
          <div>
            <p class="setting-title">Safe Mode</p>
            <p class="setting-desc">When enabled, only content marked as safe will be shown. When disabled, safe content will be hidden.</p>
          </div>
          <div>
            <label class="switch">
              <input id="safeModeToggle" type="checkbox">
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </section>
    </main>
    <nav class="bottom-nav">
      <a class="nav-link" href="index.html">
        <i class="fas fa-home"></i>
        <span>Home</span>
      </a>
      <a class="nav-link" href="shorts.html">
        <i class="fas fa-film"></i>
        <span>Shorts</span>
      </a>
      
    </nav>
  </div>

  <script src="settings.js"></script>
  <script src="metadata.js"></script>
</body>
</html>
